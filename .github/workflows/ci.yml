name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Build and validate distributions
      run: |
        python -m pip install --upgrade pip build twine
        python -m build
        python -m twine check dist/*

    - name: Verify wheel contents
      run: |
        python - <<'PY'
        import glob
        import zipfile

        wheel = glob.glob("dist/*.whl")
        assert len(wheel) == 1, wheel
        with zipfile.ZipFile(wheel[0]) as archive:
            assert "cursortrack/py.typed" in archive.namelist()
        PY

    - name: Smoke-test a minimal wheel install
      run: |
        python -m venv /tmp/cursortrack-wheel
        /tmp/cursortrack-wheel/bin/python -m pip install dist/*.whl
        /tmp/cursortrack-wheel/bin/python -c "from cursortrack import Session; assert Session"
        /tmp/cursortrack-wheel/bin/cursortrack --version
        /tmp/cursortrack-wheel/bin/cursortrack doctor

    - name: Upload distributions
      uses: actions/upload-artifact@v4
      with:
        name: cursortrack-distributions
        path: dist/*

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install .[dev,zstd,ml]

    - name: Lint with Ruff
      run: |
        ruff check .

    - name: Format check with Ruff
      run: |
        ruff format --check .

    # linux.py is excluded here: mypy narrows sys.platform to "win32" on Windows,
    # marking everything past the LinuxBackend platform guard as unreachable. The
    # Linux job type checks it for real (and symmetrically excludes windows.py).
    - name: Type check with mypy (Linux-only backend is checked for real on the Linux job)
      run: |
        mypy --follow-imports=silent cursortrack/__init__.py cursortrack/__main__.py cursortrack/core cursortrack/export cursortrack/cli cursortrack/backends/__init__.py cursortrack/backends/base.py cursortrack/backends/_touchpad_scroll.py cursortrack/backends/_windows_hid.py cursortrack/backends/_windows_touchpad.py cursortrack/backends/windows.py cursortrack/backends/macos.py

    - name: Run tests with pytest
      run: |
        pytest

  # Runs the full suite - including the real X11 LinuxBackend integration tests -
  # under a virtual X server (Xvfb), mirroring the Windows job's Python matrix.
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install X11 test dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends xvfb libx11-6 libxtst6

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install .[dev,zstd,ml]

    - name: Lint with Ruff
      run: |
        ruff check .

    - name: Format check with Ruff
      run: |
        ruff format --check .

    - name: Type check with mypy (Windows-only backend is checked for real on the Windows job)
      run: |
        mypy --follow-imports=silent \
          cursortrack/__init__.py \
          cursortrack/__main__.py \
          cursortrack/core \
          cursortrack/export \
          cursortrack/cli \
          cursortrack/backends/__init__.py \
          cursortrack/backends/base.py \
          cursortrack/backends/linux.py \
          cursortrack/backends/macos.py

    - name: Run tests with pytest under Xvfb
      run: |
        xvfb-run -a pytest

  # Stub for future macOS support
