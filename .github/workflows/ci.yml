name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install .[dev,zstd,ml]

    - name: Lint with Ruff
      run: |
        ruff check .

    - name: Format check with Ruff
      run: |
        ruff format --check .

    - name: Type check with mypy
      run: |
        mypy cursortrack

    - name: Run tests with pytest
      run: |
        pytest

  # Runs the full suite - including the real X11 LinuxBackend integration tests -
  # under a virtual X server (Xvfb), mirroring the Windows job's Python matrix.
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install X11 test dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends xvfb libx11-6 libxtst6

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install .[dev,zstd,ml]

    - name: Lint with Ruff
      run: |
        ruff check .

    - name: Format check with Ruff
      run: |
        ruff format --check .

    - name: Type check with mypy (Windows-only backend is checked for real on the Windows job)
      run: |
        mypy --follow-imports=silent \
          cursortrack/__init__.py \
          cursortrack/__main__.py \
          cursortrack/core \
          cursortrack/export \
          cursortrack/cli \
          cursortrack/backends/__init__.py \
          cursortrack/backends/base.py \
          cursortrack/backends/linux.py \
          cursortrack/backends/macos.py

    - name: Run tests with pytest under Xvfb
      run: |
        xvfb-run -a pytest

